<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of Movies</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="css/loading1.css"></link>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>    
    <div class="loader-container" id="loader-container">
        <div class="loader"></div>
    </div>
    <div class="container">
        <h3>List of Movies <button class="btn btn-primary" id="BtShow">Show</button></h3>
        <hr>
         <table id="myTable" class="table table-bordered table-hover">
            <thead class="table-dark">
                <tr>
                    <th class="text-center">No</th>
                    <th class="text-left">Movie name</th>
                    <th class="text-center">
                        Types
                    </th>
                    <th class="text-center">Image</th>
                    <th class="text-center">Air date</th>
                    <th class="text-center">Time</th>
                    <th class="text-center">Rating</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                 <!-- Existing rows can go here -->                
            </tbody>
        </table> 
    </div>
    <div class="container mt-4 d-flex justify-content-center">
        <button
            type="button"
            class="btn btn-primary"
            onclick="window.location.href='../index.html'">
            Back to Main Page
        </button>
    </div>
    
    <script src="js/AsyncFunctionWithFetch2.js"></script>
</body>
</html>
